<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🛒 Shopping Cart Summary</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px;
    }

    h1 { font-size: 2rem; color: #2d3a8c; margin-bottom: 28px; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 1rem;
      color: #444;
      margin-bottom: 14px;
      border-bottom: 2px solid #e8ebff;
      padding-bottom: 10px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.95rem;
      color: #333;
    }
    .item-row:last-child { border-bottom: none; }
    .item-price { color: #2d3a8c; font-weight: 600; }

    .btn-group { display: flex; gap: 12px; margin-top: 18px; }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s;
    }
    button:active   { transform: scale(0.97); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-save  { background: #2d3a8c; color: white; }
    .btn-load  { background: #10b981; color: white; }
    .btn-reset { background: #f3f4f6; color: #444; flex: 0.4; }

    #output-box { display: none; }

    .json-block {
      background: #1e1e2e;
      color: #a6e3a1;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      padding: 16px;
      border-radius: 10px;
      white-space: pre-wrap;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      background: #f0f4ff;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 700;
      color: #2d3a8c;
      margin-top: 10px;
    }

    .success { color: #10b981; font-size: 0.84rem; margin-top: 10px; }
  </style>
</head>
<body>

  <h1>🛒 Shopping Cart Summary</h1>

  <div class="card">
    <h2>🧺 Your Cart</h2>
    <div class="item-row"><span>🎧 Headphones</span><span class="item-price">$50</span></div>
    <div class="item-row"><span>⌨️ Keyboard</span>  <span class="item-price">$30</span></div>
    <div class="item-row"><span>🖱️ Mouse</span>     <span class="item-price">$20</span></div>

    <div class="btn-group">
      <button class="btn-save"  onclick="saveCart()">💾 Save Cart</button>
      <button class="btn-load"  onclick="loadCart()" id="load-btn" disabled>📦 Load Cart</button>
      <button class="btn-reset" onclick="resetAll()">↺</button>
    </div>
  </div>

  <div class="card" id="output-box">
    <h2 id="output-title">Output</h2>
    <div id="output-content"></div>
  </div>

  <script>

    // Step 1 — Create the cart as a JavaScript object
    let cart = {
      items: [
        { name: "Headphones", emoji: "🎧", price: 50 },
        { name: "Keyboard",   emoji: "⌨️",  price: 30 },
        { name: "Mouse",      emoji: "🖱️",  price: 20 }
      ]
    };

 function saveCart() {
 let jsonText = JSON.stringify(cart, null, 2);
 document.getElementById("output-title").textContent = "Cart Saved";
 document.getElementById("output-content").innerHTML =
  `<div class="json-block">${jsconText}</div>
  <p class="sucess">✅ Saved! Now Click Load Cart. </p>`;
  document.getElementById("output-box").style.display = "block";
  document.getElementById("load-btn").disabled = false;
 }
  /*
  1) Create the `saveCart()` function.
     a) Convert the cart object into formatted JSON text using `JSON.stringify()`.
     b) Update the output title to show that the cart is saved.
     c) Display the saved JSON inside the output box.
  */

  document.getElementById("output-content").innerHTML =
    `<div class="json-block">${jsonText}</div>
     <p class="success">✅ Saved! Now click Load Cart.</p>`;

  /*
     d) Show the output box.
     e) Enable the Load Cart button.
  */


function loadCart() {
  let jsonText = JSON.stringify(cart);
  let loadedCart = JSON.parse(jsonText);
  let total =0;
  let rows =""
  loadedCart.items.forEach(function(item){
    total += item.price;
    rows += `<div class="item-row">
      <span>${item.emoji}${item.name}</span>
      <span class="item-price">$${item.price}</span>
      </div>`;
  });
 


      document.getElementById("output-title").textContent  = "Cart Loaded";
      document.getElementById("output-content").innerHTML  =
        `${rows}
         <div class="total-row"><span>🧾 Total</span><span>$${total}</span></div>
       <p class="success">✅ Loaded successfully!</p>`;
      document.getElementById("output-box").style.display  = "block";
    }

    // Reset everything back to the start
    function resetAll() {
      document.getElementById("output-box").style.display = "none";
      document.getElementById("load-btn").disabled        = true;
    }


  </script>
</body>
</html>
