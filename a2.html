<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🚦 Traffic Light</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      color: white;
    }

    h1 { font-size: 2rem; margin-bottom: 36px; }

    .scene {
      display: flex;
      align-items: flex-start;
      gap: 44px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .light-housing {
      background: #1f2937;
      border: 4px solid #374151;
      border-radius: 20px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .light {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #374151;
      border: 3px solid #4b5563;
      transition: background 0.4s, box-shadow 0.4s;
    }

    .red-on    { background: #ef4444 !important; box-shadow: 0 0 30px #ef4444, 0 0 60px #ef444466; border-color: #fca5a5 !important; }
    .yellow-on { background: #f59e0b !important; box-shadow: 0 0 30px #f59e0b, 0 0 60px #f59e0b66; border-color: #fde68a !important; }
    .green-on  { background: #10b981 !important; box-shadow: 0 0 30px #10b981, 0 0 60px #10b98166; border-color: #6ee7b7 !important; }

    .info-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 220px;
    }

    .status-box {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 16px 20px;
    }

    .lbl  { font-size: 0.72rem; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    #msg  { font-size: 1.2rem; font-weight: 700; }

    .counter-box {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #count { font-size: 1.4rem; font-weight: 800; color: #a78bfa; }

    .btn-group { display: flex; gap: 10px; }

    button {
      padding: 11px 20px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s;
      flex: 1;
    }
    button:active   { transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-start { background: #10b981; color: white; }
    .btn-stop  { background: #ef4444; color: white; }
  </style>
</head>
<body>

  <h1>🚦 Traffic Light</h1>

  <div class="scene">

    <div class="light-housing">
      <div class="light" id="red"></div>
      <div class="light" id="yellow"></div>
      <div class="light" id="green"></div>
    </div>

    <div class="info-panel">
      <div class="status-box">
        <div class="lbl">Current Signal</div>
        <div id="msg">Press Start 👇</div>
      </div>

      <div class="counter-box">
        <span style="font-size:0.8rem;color:#9ca3af;">🔁 Cycles</span>
        <span id="count">0</span>
      </div>

      <div class="btn-group">
        <button class="btn-start" id="btn-start" onclick="startLight()">▶ Start</button>
        <button class="btn-stop"  id="btn-stop"  onclick="stopLight()" disabled>■ Stop</button>
      </div>
    </div>

  </div>

  <script>

    let running = false;
    let cycles  = 0;
    let timer   = null;

    // Turn on one light and turn off the others
    function setLight(color) {
      document.getElementById("red").className    = "light" + (color === "red"    ? " red-on"    : "");
      document.getElementById("yellow").className = "light" + (color === "yellow" ? " yellow-on" : "");
      document.getElementById("green").className  = "light" + (color === "green"  ? " green-on"  : "");
      document.getElementById("msg").textContent  = color === "red" ? "🔴 STOP" : color === "green" ? "🟢 GO" : "🟡 SLOW DOWN";
    }

    // Each function turns on its light, waits, then calls the next function (callback)
    function showRed(next) {
      setLight("red");
      timer = setTimeout(next, 3000);
    }

    function showGreen(next) {
      setLight("green");
      timer = setTimeout(next, 2000);
    }

    function showYellow(next) {
      setLight("yellow");
      timer = setTimeout(function() {
        cycles++;
        document.getElementById("count").textContent = cycles;
        next();
      }, 1000);
    }

    function cycle() {
      if (!running) return;
      showRed(function() {
        showGreen(function() {
          showYellow(function(){
            cycle();
          });
        });
      });
    }
  

function startLight() {
  running =true;
  document.getElementById("btn-start").disabled = true;
  document.getElementById("btn-stop").disabled = false;
  cycle();
}

function stopLight() {
 running = false;
 clearTimeout(timer);

  document.getElementById("msg").textContent = "⏹️ Stopped";

  /*
     d) Show the stopped message.
     e) Enable the Start button.
     f) Disable the Stop button.
  */
}

  </script>
</body>
</html>
