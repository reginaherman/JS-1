<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🪙 Coin Flip Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      color: white;
    }

    h1 { font-size: 2.2rem; margin-bottom: 32px; }

    /* Coin */
    .coin-wrapper { perspective: 800px; margin-bottom: 30px; }

    .coin {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      position: relative;
      transform-style: preserve-3d;
    }

    .coin.heads { animation: goHeads 0.9s ease forwards; }
    .coin.tails { animation: goTails 0.9s ease forwards; }

    @keyframes goHeads {
      0%   { transform: rotateY(0deg); }
      50%  { transform: rotateY(900deg) translateY(-40px); }
      100% { transform: rotateY(1440deg); }
    }
    @keyframes goTails {
      0%   { transform: rotateY(0deg); }
      50%  { transform: rotateY(900deg) translateY(-40px); }
      100% { transform: rotateY(1260deg); }
    }

    .face {
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      backface-visibility: hidden;
    }

    .face-heads {
      background: radial-gradient(circle at 35% 35%, #fde68a, #f59e0b, #b45309);
      border: 4px solid #fbbf24;
      box-shadow: 0 0 30px #f59e0b88;
    }
    .face-tails {
      background: radial-gradient(circle at 35% 35%, #cbd5e1, #94a3b8, #475569);
      border: 4px solid #94a3b8;
      transform: rotateY(180deg);
    }

    /* Score */
    .scores { display: flex; gap: 20px; margin-bottom: 26px; }

    .score {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 12px 24px;
      text-align: center;
    }
    .score .num { font-size: 1.8rem; font-weight: 800; }
    .score .lbl { font-size: 0.72rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
    .wins  .num { color: #34d399; }
    .losses .num { color: #f87171; }
    .total  .num { color: #a78bfa; }

    #result { font-size: 1.5rem; font-weight: 800; min-height: 50px; margin-bottom: 22px; text-align: center; }

    #flip-btn {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 15px 44px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124,58,237,0.5);
      transition: transform 0.1s;
    }
    #flip-btn:active   { transform: scale(0.95); }
    #flip-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <h1>🪙 Coin Flip Game</h1>

  <div class="coin-wrapper">
    <div class="coin" id="coin">
      <div class="face face-heads">🌟</div>
      <div class="face face-tails">💀</div>
    </div>
  </div>

  <div class="scores">
    <div class="score wins">
      <div class="num" id="wins">0</div>
      <div class="lbl">Wins 🎉</div>
    </div>
    <div class="score losses">
      <div class="num" id="losses">0</div>
      <div class="lbl">Losses 💀</div>
    </div>
    <div class="score total">
      <div class="num" id="total">0</div>
      <div class="lbl">Flips</div>
    </div>
  </div>

  <div id="result">Flip the coin to play!</div>

  <button id="flip-btn" onclick="flipCoin()">🪙 Flip the Coin!</button>

  <script>

    let wins   = 0;
    let losses = 0;
    let total  = 0;

function flipCoin() {
 let btn = document.getElementById("flip-btn");
 let coin = document.getElementById("coin");
 btn.disabled = true;
  document.getElementById("result").textContent = "⏳ Flipping...";

  coin.className = "coin";
  void coin.offsetWidth;
  let flip = new Promise(function(resolve,reject) {
    setTimeout(function() {
      let isHeads = Math.random() <0.5;
      coins.className = "coin" + (isHeads ? "heads" : "tails");
      if (isHeads) {
        resolve("HEADS - You Win! 🎉")
      } else {
        reject("TAILS - You Lose! 💀");
      }
      }, 900);
  });
  flip.then(function(message) {
        wins++;
        total++;
        document.getElementById("result").textContent  = message;
        document.getElementById("wins").textContent    = wins;
        document.getElementById("total").textContent   = total;
        btn.disabled = false;
      });

      // .catch() runs when the Promise rejects (loss)
      flip.catch(function(message) {
        losses++;
        total++;
        document.getElementById("result").textContent  = message;
        document.getElementById("losses").textContent  = losses;
        document.getElementById("total").textContent   = total;
        btn.disabled = false;
      });
    }

  </script>
</body>
</html>
